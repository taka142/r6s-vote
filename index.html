<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6S カスタム投票</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0e1a; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const BIN_ID = "6a08005badc21f119aa9d37e";
const API_KEY = "$2a$10$oj0f.GAiVPZyXO1qLu5UAuneLd8.LW.KlWIzjTGRS.kzvn4F4yW3W";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = {
  "Content-Type": "application/json",
  "X-Master-Key": API_KEY,
  "X-Access-Key": API_KEY,
  "X-Bin-Versioning": "false"
};

const ADMIN_PASSWORD = "eKn/z7Fqh.kLs9%";

const PLAYERS = [
  "けろちゃん","みぃ","真昼ねる","猫端かれー","甘玉あめ",
  "眠睡るか","佐倉サニャ","神在月楓華","泉戸みつき","播磨かなで"
];

const MAPS = [
  "山荘","国境","クラブハウス","銀行","領事館",
  "ナイトヘイヴンラボ","アジト","カフェ・ドストエフスキー","要塞"
];

const PHASES = {
  WAITING_MAP: "waiting_map",
  MAP_VOTING: "map_voting",
  MAP_RESULT: "map_result",
  WAITING_MVP: "waiting_mvp",
  MVP_VOTING: "mvp_voting",
  MVP_RESULT: "mvp_result",
};

const phaseLabels = {
  waiting_map: "MAP投票 待機中",
  map_voting: "MAP投票 受付中",
  map_result: "MAP投票 結果発表",
  waiting_mvp: "MVP投票 待機中",
  mvp_voting: "MVP投票 受付中",
  mvp_result: "MVP投票 結果発表",
};

const defaultState = { phase: "waiting_map", mapVotes: {}, mvpVotes: {} };

async function fetchState() {
  const r = await fetch(BIN_URL + "/latest", {
    headers: { "X-Master-Key": API_KEY, "X-Access-Key": API_KEY }
  });
  const d = await r.json();
  return d.record || defaultState;
}

async function saveState(state) {
  await fetch(BIN_URL, { method: "PUT", headers: HEADERS, body: JSON.stringify(state) });
}

function App() {
  const [state, setState] = useState(defaultState);
  const [view, setView] = useState("home");
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminInput, setAdminInput] = useState("");
  const [adminError, setAdminError] = useState("");
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [mvpSelection, setMvpSelection] = useState([]);
  const [mapSelection, setMapSelection] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  const load = useCallback(async () => {
    try { const s = await fetchState(); setState(s); } catch(e) { console.error(e); }
    setLoading(false);
  }, []);

  useEffect(() => {
    load();
    const iv = setInterval(load, 3000);
    return () => clearInterval(iv);
  }, [load]);

  const update = async (newState) => {
    setSaving(true);
    setState(newState);
    await saveState(newState);
    setSaving(false);
  };

  const handleAdminLogin = () => {
    if (adminInput === ADMIN_PASSWORD) { setAdminAuthed(true); setAdminError(""); setView("admin"); }
    else setAdminError("パスワードが違います");
  };

  const resetAll = async () => {
    if (window.confirm("全データをリセットしますか？")) await update(defaultState);
  };

  const submitMapVote = async () => {
    if (!mapSelection) return;
    const ns = { ...state, mapVotes: { ...state.mapVotes, [selectedPlayer]: mapSelection } };
    await update(ns);
    setView("voted");
  };

  const submitMvpVote = async () => {
    if (mvpSelection.length !== 2) return;
    const ns = { ...state, mvpVotes: { ...state.mvpVotes, [selectedPlayer]: mvpSelection } };
    await update(ns);
    setView("voted");
  };

  const toggleMvp = (p) => {
    setMvpSelection(sel =>
      sel.includes(p) ? sel.filter(x => x !== p) : sel.length < 2 ? [...sel, p] : sel
    );
  };

  const mapTally = () => {
    const t = {};
    MAPS.forEach(m => t[m] = 0);
    Object.values(state.mapVotes).forEach(m => t[m] = (t[m]||0)+1);
    return Object.entries(t).sort((a,b) => b[1]-a[1]);
  };

  const mvpTally = () => {
    const t = {};
    PLAYERS.forEach(p => t[p] = 0);
    Object.values(state.mvpVotes).forEach(arr => arr.forEach(p => t[p] = (t[p]||0)+1));
    return Object.entries(t).sort((a,b) => b[1]-a[1]);
  };

  const maxMap = mapTally()[0]?.[1] || 0;
  const maxMvp = mvpTally()[0]?.[1] || 0;
  const { phase } = state;

  const s = {
    wrap: { minHeight:"100vh", background:"#0a0e1a", color:"#e8eaf0", fontFamily:"'Segoe UI',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", padding:"20px 12px" },
    card: { background:"#131929", border:"1px solid #1e2d4a", borderRadius:12, padding:"24px 20px", width:"100%", maxWidth:480, marginBottom:16 },
    title: { color:"#f4a227", fontSize:22, fontWeight:700, marginBottom:4, textAlign:"center", letterSpacing:1 },
    sub: { color:"#7a8baa", fontSize:13, textAlign:"center", marginBottom:20 },
    btn: (c="#f4a227") => ({ background:c, color:c==="#f4a227"?"#0a0e1a":"#fff", border:"none", borderRadius:8, padding:"10px 20px", fontWeight:700, fontSize:15, cursor:"pointer", margin:"4px" }),
    btnGhost: { background:"transparent", color:"#7a8baa", border:"1px solid #2a3a5a", borderRadius:8, padding:"8px 16px", fontSize:13, cursor:"pointer" },
    input: { background:"#0d1525", border:"1px solid #2a3a5a", borderRadius:8, color:"#e8eaf0", padding:"10px 14px", fontSize:15, width:"100%", marginBottom:8 },
    grid: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 },
    optBtn: (sel) => ({ background:sel?"#f4a227":"#0d1525", color:sel?"#0a0e1a":"#c0cce0", border:`1px solid ${sel?"#f4a227":"#2a3a5a"}`, borderRadius:8, padding:"10px 8px", fontSize:14, fontWeight:sel?700:400, cursor:"pointer", textAlign:"center" }),
    badge: { display:"inline-block", background:"#f4a227", color:"#0a0e1a", borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:700, marginLeft:6 },
    phaseTag: { display:"inline-block", background:"#1a2d4a", color:"#7ab8f5", borderRadius:20, padding:"4px 14px", fontSize:13, marginBottom:16 },
    bar: (pct,hi) => ({ height:10, borderRadius:5, background:hi?"#f4a227":"#2a3a5a", width:`${Math.max(pct*100,2)}%`, transition:"width .4s" }),
    row: { display:"flex", alignItems:"center", gap:8, marginBottom:8 },
    label: { width:140, fontSize:14, color:"#c0cce0", flexShrink:0 },
    count: { width:28, textAlign:"right", fontSize:13, color:"#f4a227", fontWeight:700 },
    err: { color:"#e05c5c", fontSize:13, marginBottom:8 },
    sep: { borderTop:"1px solid #1e2d4a", margin:"16px 0" },
    sync: { fontSize:11, color:"#3a9a5c", textAlign:"center", marginBottom:8 },
  };

  if (loading) return (
    <div style={{...s.wrap, justifyContent:"center"}}>
      <div style={{color:"#7ab8f5", fontSize:18}}>読み込み中...</div>
    </div>
  );

  if (view === "home") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.title}>🎮 R6S カスタム投票</div>
        <div style={s.sub}>Rainbow Six Siege</div>
        <div style={{textAlign:"center",marginBottom:12}}>
          <span style={s.phaseTag}>{phaseLabels[phase]}</span>
        </div>
        {saving && <div style={s.sync}>同期中...</div>}
        <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
          {(phase===PHASES.MAP_VOTING||phase===PHASES.MVP_VOTING) && (
            <button style={s.btn()} onClick={()=>{setView("player_select");setMvpSelection([]);setMapSelection(null);}}>投票する</button>
          )}
          {(phase===PHASES.MAP_RESULT||phase===PHASES.MVP_RESULT) && (
            <button style={s.btn("#4a9eff")} onClick={()=>setView("result")}>結果を見る</button>
          )}
          <button style={s.btnGhost} onClick={()=>setView("admin_login")}>管理者</button>
        </div>
      </div>
    </div>
  );

  if (view === "admin_login") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.title}>🔐 管理者ログイン</div>
        <input style={s.input} type="password" placeholder="パスワード" value={adminInput}
          onChange={e=>setAdminInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()} />
        {adminError && <div style={s.err}>{adminError}</div>}
        <div style={{display:"flex",gap:8}}>
          <button style={s.btn()} onClick={handleAdminLogin}>ログイン</button>
          <button style={s.btnGhost} onClick={()=>{setView("home");setAdminInput("");setAdminError("");}}>戻る</button>
        </div>
      </div>
    </div>
  );

  if (view === "admin") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.title}>⚙️ 管理者パネル</div>
        <div style={{textAlign:"center",marginBottom:12}}>
          <span style={s.phaseTag}>{phaseLabels[phase]}</span>
        </div>
        {saving && <div style={s.sync}>同期中...</div>}
        <div style={s.sep}/>
        <div style={{fontWeight:700,color:"#7ab8f5",marginBottom:10}}>MAP投票</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          <button style={s.btn(phase===PHASES.MAP_VOTING?"#3a9a5c":"#f4a227")}
            onClick={()=>update({...state,phase:PHASES.MAP_VOTING})} disabled={phase===PHASES.MAP_VOTING||saving}>
            MAP投票 開始
          </button>
          <button style={s.btn("#c0392b")}
            onClick={()=>update({...state,phase:PHASES.MAP_RESULT})} disabled={phase!==PHASES.MAP_VOTING||saving}>
            MAP投票 締め切り
          </button>
        </div>
        <div style={{fontSize:13,color:"#7a8baa",marginBottom:4}}>
          投票済み: {Object.keys(state.mapVotes).length} / {PLAYERS.length}名
        </div>
        <div style={s.sep}/>
        <div style={{fontWeight:700,color:"#7ab8f5",marginBottom:10}}>MVP投票</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          <button style={s.btn(phase===PHASES.MVP_VOTING?"#3a9a5c":"#f4a227")}
            onClick={()=>update({...state,phase:PHASES.MVP_VOTING})}
            disabled={phase===PHASES.MVP_VOTING||saving}>
            MVP投票 開始
          </button>
          <button style={s.btn("#c0392b")}
            onClick={()=>update({...state,phase:PHASES.MVP_RESULT})} disabled={phase!==PHASES.MVP_VOTING||saving}>
            MVP投票 締め切り
          </button>
        </div>
        <div style={{fontSize:13,color:"#7a8baa",marginBottom:4}}>
          投票済み: {Object.keys(state.mvpVotes).length} / {PLAYERS.length}名
        </div>
        <div style={s.sep}/>
        {(phase===PHASES.MAP_RESULT||phase===PHASES.MVP_RESULT) && (
          <button style={{...s.btn("#4a9eff"),marginBottom:8}} onClick={()=>setView("result")}>結果を見る</button>
        )}
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button style={s.btn("#c0392b")} disabled={saving}
            onClick={async()=>{ if(window.confirm("MAP投票をリセットしますか？")) await update({...state,phase:PHASES.WAITING_MAP,mapVotes:{}}); }}>
            MAPリセット
          </button>
          <button style={s.btn("#c0392b")} disabled={saving} onClick={resetAll}>全リセット</button>
          <button style={s.btnGhost} onClick={()=>setView("home")}>ホームへ</button>
        </div>
      </div>
    </div>
  );

  if (view === "result") {
    const mt = mapTally();
    const mvt = mvpTally();
    const showMap = [PHASES.MAP_RESULT,PHASES.MVP_RESULT,PHASES.MVP_VOTING,PHASES.WAITING_MVP].includes(phase);
    const showMvp = phase===PHASES.MVP_RESULT;
    return (
      <div style={s.wrap}>
        <div style={s.card}>
          <div style={s.title}>📊 投票結果</div>
          {showMap && (<>
            <div style={{fontWeight:700,color:"#f4a227",marginBottom:10}}>🗺️ MAP投票</div>
            {mt.map(([m,c])=>(
              <div key={m} style={s.row}>
                <span style={s.label}>{m}{c===maxMap&&c>0&&<span style={s.badge}>1位</span>}</span>
                <div style={{flex:1}}><div style={s.bar(maxMap?c/maxMap:0,c===maxMap&&c>0)}/></div>
                <span style={s.count}>{c}</span>
              </div>
            ))}
            <div style={s.sep}/>
          </>)}
          {showMvp && (<>
            <div style={{fontWeight:700,color:"#f4a227",marginBottom:10}}>🏆 MVP</div>
            {(() => {
              const ranked = mvt.filter(([,c]) => c > 0);
              if (ranked.length === 0) return <div style={{color:"#7a8baa"}}>まだ投票がありません</div>;
              const first = ranked[0]?.[1] || 0;
              const second = ranked.find(([,c]) => c < first)?.[1] || 0;
              // 1位全員 + 2位該当者（1位が2名以上いれば2位なし）
              const firstList = ranked.filter(([,c]) => c === first);
              const display = firstList.length >= 2
                ? firstList
                : ranked.filter(([,c]) => c === first || c === second);
              return display.map(([p,c]) => (
                <div key={p} style={{...s.row, background:"#1a2d1a", borderRadius:8, padding:"10px 12px"}}>
                  <span style={{flex:1, fontSize:16, fontWeight:700, color:"#f4a227"}}>{p}</span>
                  <span style={{...s.badge, fontSize:13}}>MVP</span>
                  <span style={{...s.count, marginLeft:8}}>{c}票</span>
                </div>
              ));
            })()}
          </>)}
          {!showMap&&!showMvp&&<div style={{color:"#7a8baa",textAlign:"center"}}>まだ結果はありません</div>}
          <div style={s.sep}/>
          <button style={s.btnGhost} onClick={()=>setView(adminAuthed?"admin":"home")}>戻る</button>
        </div>
      </div>
    );
  }

  if (view === "player_select") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.title}>👤 参加者を選択</div>
        <div style={s.sub}>あなたの名前を選んでください</div>
        <div style={s.grid}>
          {PLAYERS.map(p=>{
            const voted = phase===PHASES.MAP_VOTING ? state.mapVotes[p] : state.mvpVotes[p];
            return (
              <button key={p} style={{...s.optBtn(selectedPlayer===p),opacity:voted?0.45:1}}
                disabled={!!voted} onClick={()=>setSelectedPlayer(p)}>
                {p}{voted&&" ✓"}
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={s.btn()} disabled={!selectedPlayer}
            onClick={()=>setView(phase===PHASES.MAP_VOTING?"map_vote":"mvp_vote")}>次へ</button>
          <button style={s.btnGhost} onClick={()=>{setView("home");setSelectedPlayer(null);}}>戻る</button>
        </div>
      </div>
    </div>
  );

  if (view === "map_vote") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.title}>🗺️ MAP投票</div>
        <div style={s.sub}>{selectedPlayer} さん — マップを1つ選んでください</div>
        <div style={s.grid}>
          {MAPS.map(m=>(
            <button key={m} style={s.optBtn(mapSelection===m)} onClick={()=>setMapSelection(m)}>{m}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={s.btn()} disabled={!mapSelection||saving} onClick={submitMapVote}>
            {saving?"送信中...":"投票する"}
          </button>
          <button style={s.btnGhost} onClick={()=>{setView("player_select");setMapSelection(null);}}>戻る</button>
        </div>
      </div>
    </div>
  );

  if (view === "mvp_vote") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.title}>🏆 MVP投票</div>
        <div style={s.sub}>{selectedPlayer} さん — 2名を選んでください（自分以外）</div>
        <div style={{marginBottom:10,textAlign:"center"}}>
          <span style={{color:mvpSelection.length===2?"#3a9a5c":"#f4a227",fontWeight:700}}>
            {mvpSelection.length} / 2 票
          </span>
        </div>
        <div style={s.grid}>
          {PLAYERS.filter(p=>p!==selectedPlayer).map(p=>(
            <button key={p} style={s.optBtn(mvpSelection.includes(p))} onClick={()=>toggleMvp(p)}>
              {p}{mvpSelection.includes(p)&&" ✓"}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={s.btn()} disabled={mvpSelection.length!==2||saving} onClick={submitMvpVote}>
            {saving?"送信中...":"投票する"}
          </button>
          <button style={s.btnGhost} onClick={()=>{setView("player_select");setMvpSelection([]);}}>戻る</button>
        </div>
      </div>
    </div>
  );

  if (view === "voted") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:12}}>✅</div>
          <div style={s.title}>投票完了！</div>
          <div style={s.sub}>{selectedPlayer} さんの投票を受け付けました</div>
          <button style={s.btn()} onClick={()=>{setView("home");setSelectedPlayer(null);setMvpSelection([]);setMapSelection(null);}}>
            ホームへ戻る
          </button>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
