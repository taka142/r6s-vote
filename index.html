<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6S カスタム投票</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #fff0f5 0%, #fce4f0 50%, #f0e6ff 100%);
    min-height: 100vh;
    font-family: 'Noto Sans JP', sans-serif;
  }
  button { transition: all 0.2s; }
  button:hover { transform: translateY(-1px); opacity: 0.9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const BIN_ID = "6a08005badc21f119aa9d37e";
const API_KEY = "$2a$10$oj0f.GAiVPZyXO1qLu5UAuneLd8.LW.KlWIzjTGRS.kzvn4F4yW3W";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HEADERS = {
  "Content-Type": "application/json",
  "X-Master-Key": API_KEY,
  "X-Access-Key": API_KEY,
  "X-Bin-Versioning": "false"
};

const ADMIN_PASSWORD = "eKn/z7Fqh.kLs9%";

const PLAYERS = [
  "けろちゃん","みぃ","真昼ねる","猫端かれー","甘玉あめ",
  "眠睡るか","佐倉サニャ","神在月楓華","泉戸みつき","播磨かなで"
];

const MAPS = [
  "山荘","国境","クラブハウス","銀行","領事館",
  "ナイトヘイヴンラボ","アジト","カフェ・ドストエフスキー","要塞"
];

const PHASES = {
  WAITING_MAP: "waiting_map", MAP_VOTING: "map_voting", MAP_RESULT: "map_result",
  MAP_RUNOFF: "map_runoff", MAP_RUNOFF_RESULT: "map_runoff_result",
  WAITING_MVP: "waiting_mvp", MVP_VOTING: "mvp_voting", MVP_RESULT: "mvp_result",
};

const phaseLabels = {
  waiting_map:"MAP投票 待機中", map_voting:"MAP投票 受付中", map_result:"MAP投票 結果発表",
  map_runoff:"MAP決選投票 受付中", map_runoff_result:"MAP決選投票 結果発表",
  waiting_mvp:"MVP投票 待機中", mvp_voting:"MVP投票 受付中", mvp_result:"MVP投票 結果発表",
};

const defaultState = { phase:"waiting_map", mapVotes:{}, runoffVotes:{}, runoffMaps:[], mvpVotes:{} };

async function fetchState() {
  const r = await fetch(BIN_URL+"/latest", { headers:{"X-Master-Key":API_KEY,"X-Access-Key":API_KEY} });
  const d = await r.json();
  return { ...defaultState, ...(d.record||{}) };
}
async function saveState(state) {
  await fetch(BIN_URL, { method:"PUT", headers:HEADERS, body:JSON.stringify(state) });
}

const C = {
  bg: "linear-gradient(135deg, #fff0f5 0%, #fce4f0 50%, #f0e6ff 100%)",
  pink: "#e91e8c",
  pinkLight: "#ff6eb4",
  pinkPale: "#fff0f8",
  purple: "#9c4dcc",
  purpleLight: "#ce93d8",
  white: "#ffffff",
  gray: "#9e9e9e",
  grayLight: "#f5f5f5",
  text: "#4a2040",
  textSub: "#b07090",
  red: "#e53935",
  blue: "#5c6bc0",
  green: "#43a047",
};

function App() {
  const [state, setState] = useState(defaultState);
  const [view, setView] = useState("home");
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminInput, setAdminInput] = useState("");
  const [adminError, setAdminError] = useState("");
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [mvpSelection, setMvpSelection] = useState([]);
  const [mapSelection, setMapSelection] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  const load = useCallback(async () => {
    try { const s = await fetchState(); setState(s); } catch(e) { console.error(e); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); const iv = setInterval(load, 3000); return () => clearInterval(iv); }, [load]);

  const update = async (ns) => { setSaving(true); setState(ns); await saveState(ns); setSaving(false); };
  const handleAdminLogin = () => {
    if (adminInput === ADMIN_PASSWORD) { setAdminAuthed(true); setAdminError(""); setView("admin"); }
    else setAdminError("パスワードが違います");
  };
  const resetAll = async () => { if (window.confirm("全データをリセットしますか？")) await update(defaultState); };
  const resetMap = async () => { if (window.confirm("MAP投票をリセットしますか？")) await update({...state, phase:PHASES.WAITING_MAP, mapVotes:{}, runoffVotes:{}, runoffMaps:[]}); };

  const mapTally = () => {
    const t = {}; MAPS.forEach(m => t[m]=0);
    Object.values(state.mapVotes).forEach(m => t[m]=(t[m]||0)+1);
    return Object.entries(t).sort((a,b) => b[1]-a[1]);
  };
  const getRunoffMaps = () => {
    const t = mapTally(); const top = t[0]?.[1]||0;
    if (!top) return [];
    const tied = t.filter(([,c]) => c===top).map(([m]) => m);
    return tied.length >= 2 ? tied : [];
  };
  const runoffTally = () => {
    const t = {}; (state.runoffMaps||[]).forEach(m => t[m]=0);
    Object.values(state.runoffVotes||{}).forEach(m => t[m]=(t[m]||0)+1);
    return Object.entries(t).sort((a,b) => b[1]-a[1]);
  };
  const mvpTally = () => {
    const t = {}; PLAYERS.forEach(p => t[p]=0);
    Object.values(state.mvpVotes).forEach(arr => arr.forEach(p => t[p]=(t[p]||0)+1));
    return Object.entries(t).sort((a,b) => b[1]-a[1]);
  };

  const maxMap = mapTally()[0]?.[1]||0;
  const maxRunoff = runoffTally()[0]?.[1]||0;
  const { phase } = state;
  const isVoting = [PHASES.MAP_VOTING,PHASES.MVP_VOTING,PHASES.MAP_RUNOFF].includes(phase);
  const isResult = [PHASES.MAP_RESULT,PHASES.MVP_RESULT,PHASES.MAP_RUNOFF_RESULT].includes(phase);

  const submitMapVote = async () => {
    if (!mapSelection) return;
    const key = phase===PHASES.MAP_RUNOFF ? "runoffVotes" : "mapVotes";
    await update({...state, [key]:{...state[key],[selectedPlayer]:mapSelection}});
    setView("voted");
  };
  const submitMvpVote = async () => {
    if (mvpSelection.length!==2) return;
    await update({...state, mvpVotes:{...state.mvpVotes,[selectedPlayer]:mvpSelection}});
    setView("voted");
  };
  const toggleMvp = (p) => setMvpSelection(sel =>
    sel.includes(p) ? sel.filter(x=>x!==p) : sel.length<2 ? [...sel,p] : sel
  );

  // ---- Styles ----
  const s = {
    wrap: { minHeight:"100vh", background:C.bg, display:"flex", flexDirection:"column", alignItems:"center", padding:"24px 14px" },
    card: {
      background:"rgba(255,255,255,0.85)",
      backdropFilter:"blur(10px)",
      border:"1.5px solid rgba(233,30,140,0.15)",
      borderRadius:20,
      padding:"28px 22px",
      width:"100%", maxWidth:480, marginBottom:16,
      boxShadow:"0 4px 24px rgba(233,30,140,0.08)"
    },
    title: { color:C.pink, fontSize:22, fontWeight:700, marginBottom:4, textAlign:"center", letterSpacing:1 },
    sub: { color:C.textSub, fontSize:13, textAlign:"center", marginBottom:20 },
    btn: (c=C.pink) => ({
      background:`linear-gradient(135deg, ${c}, ${c}cc)`,
      color:"#fff", border:"none", borderRadius:50,
      padding:"11px 22px", fontWeight:700, fontSize:14,
      cursor:"pointer", margin:"4px",
      boxShadow:`0 2px 12px ${c}44`,
      fontFamily:"'Noto Sans JP',sans-serif"
    }),
    btnGhost: {
      background:"transparent", color:C.textSub,
      border:`1.5px solid ${C.purpleLight}`, borderRadius:50,
      padding:"9px 18px", fontSize:13, cursor:"pointer",
      fontFamily:"'Noto Sans JP',sans-serif"
    },
    input: {
      background:"#fff8fc", border:`1.5px solid ${C.purpleLight}`,
      borderRadius:12, color:C.text, padding:"10px 14px",
      fontSize:15, width:"100%", marginBottom:8,
      fontFamily:"'Noto Sans JP',sans-serif", outline:"none"
    },
    grid: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 },
    optBtn: (sel) => ({
      background: sel ? `linear-gradient(135deg,${C.pink},${C.purple})` : "#fff8fc",
      color: sel ? "#fff" : C.text,
      border: `1.5px solid ${sel ? C.pink : C.purpleLight}`,
      borderRadius:12, padding:"10px 8px", fontSize:13,
      fontWeight: sel ? 700 : 400, cursor:"pointer", textAlign:"center",
      fontFamily:"'Noto Sans JP',sans-serif",
      boxShadow: sel ? `0 2px 8px ${C.pink}44` : "none"
    }),
    badge: {
      display:"inline-block",
      background:`linear-gradient(135deg,${C.pink},${C.purple})`,
      color:"#fff", borderRadius:20, padding:"2px 10px",
      fontSize:11, fontWeight:700, marginLeft:6
    },
    phaseTag: (c=C.pink) => ({
      display:"inline-block", background:`${c}18`,
      color:c, borderRadius:20, padding:"5px 16px",
      fontSize:13, fontWeight:700, marginBottom:16,
      border:`1px solid ${c}44`
    }),
    bar: (pct,hi) => ({
      height:8, borderRadius:4,
      background: hi ? `linear-gradient(90deg,${C.pink},${C.purple})` : "#f0d0e8",
      width:`${Math.max(pct*100,2)}%`, transition:"width .4s"
    }),
    row: { display:"flex", alignItems:"center", gap:8, marginBottom:8 },
    label: { width:140, fontSize:13, color:C.text, flexShrink:0 },
    count: { width:28, textAlign:"right", fontSize:13, color:C.pink, fontWeight:700 },
    err: { color:C.red, fontSize:13, marginBottom:8 },
    sep: { borderTop:`1px solid ${C.pink}22`, margin:"16px 0" },
    sync: { fontSize:11, color:C.green, textAlign:"center", marginBottom:8 },
    sectionTitle: { fontWeight:700, color:C.purple, marginBottom:10, fontSize:14 },
  };

  if (loading) return (
    <div style={{...s.wrap, justifyContent:"center"}}>
      <div style={{color:C.pink, fontSize:18}}>読み込み中... 🌸</div>
    </div>
  );

  if (view==="home") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={{textAlign:"center",marginBottom:8,fontSize:28}}>🌸</div>
        <div style={s.title}>R6S カスタム投票</div>
        <div style={s.sub}>Rainbow Six Siege</div>
        <div style={{textAlign:"center",marginBottom:16}}>
          <span style={s.phaseTag(phase===PHASES.MAP_RUNOFF?C.red:C.pink)}>{phaseLabels[phase]}</span>
        </div>
        {saving && <div style={s.sync}>同期中...</div>}
        <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
          {isVoting && (
            <button style={s.btn(phase===PHASES.MAP_RUNOFF?C.red:C.pink)}
              onClick={()=>{setView("player_select");setMvpSelection([]);setMapSelection(null);}}>
              {phase===PHASES.MAP_RUNOFF?"🔥 決選投票する":"✨ 投票する"}
            </button>
          )}
          {isResult && (
            <button style={s.btn(C.purple)} onClick={()=>setView("result")}>📊 結果を見る</button>
          )}
          <button style={s.btnGhost} onClick={()=>setView("admin_login")}>管理者</button>
        </div>
      </div>
    </div>
  );

  if (view==="admin_login") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.title}>🔐 管理者ログイン</div>
        <input style={s.input} type="password" placeholder="パスワード" value={adminInput}
          onChange={e=>setAdminInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleAdminLogin()} />
        {adminError && <div style={s.err}>{adminError}</div>}
        <div style={{display:"flex",gap:8}}>
          <button style={s.btn()} onClick={handleAdminLogin}>ログイン</button>
          <button style={s.btnGhost} onClick={()=>{setView("home");setAdminInput("");setAdminError("");}}>戻る</button>
        </div>
      </div>
    </div>
  );

  if (view==="admin") {
    const runoffMaps = getRunoffMaps();
    const showRunoffBtn = (phase===PHASES.MAP_RESULT||phase===PHASES.MAP_RUNOFF||phase===PHASES.MAP_RUNOFF_RESULT) && (runoffMaps.length>=2||(state.runoffMaps||[]).length>=2);
    return (
      <div style={s.wrap}>
        <div style={s.card}>
          <div style={s.title}>⚙️ 管理者パネル</div>
          <div style={{textAlign:"center",marginBottom:12}}>
            <span style={s.phaseTag(phase===PHASES.MAP_RUNOFF?C.red:C.pink)}>{phaseLabels[phase]}</span>
          </div>
          {saving && <div style={s.sync}>同期中...</div>}

          <div style={s.sep}/>
          <div style={s.sectionTitle}>🗺️ MAP投票</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            <button style={s.btn(phase===PHASES.MAP_VOTING?C.green:C.pink)}
              onClick={()=>update({...state,phase:PHASES.MAP_VOTING})} disabled={phase===PHASES.MAP_VOTING||saving}>
              MAP投票 開始
            </button>
            <button style={s.btn(C.red)}
              onClick={()=>update({...state,phase:PHASES.MAP_RESULT})} disabled={phase!==PHASES.MAP_VOTING||saving}>
              MAP投票 締め切り
            </button>
          </div>
          <div style={{fontSize:13,color:C.textSub,marginBottom:4}}>
            投票済み: {Object.keys(state.mapVotes).length} / {PLAYERS.length}名
          </div>

          {showRunoffBtn && (<>
            <div style={{fontSize:13,color:C.red,margin:"8px 0"}}>
              ⚠️ 1位同数：{(runoffMaps.length>=2?runoffMaps:state.runoffMaps).join("・")}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
              <button style={s.btn(phase===PHASES.MAP_RUNOFF?C.green:C.red)}
                onClick={()=>update({...state,phase:PHASES.MAP_RUNOFF,runoffMaps:runoffMaps.length>=2?runoffMaps:state.runoffMaps,runoffVotes:{}})}
                disabled={phase===PHASES.MAP_RUNOFF||saving}>
                🔥 決選投票 開始
              </button>
              <button style={s.btn(C.red)}
                onClick={()=>update({...state,phase:PHASES.MAP_RUNOFF_RESULT})}
                disabled={phase!==PHASES.MAP_RUNOFF||saving}>
                決選投票 締め切り
              </button>
            </div>
            <div style={{fontSize:13,color:C.textSub,marginBottom:4}}>
              決選投票済み: {Object.keys(state.runoffVotes||{}).length} / {PLAYERS.length}名
            </div>
          </>)}

          <div style={s.sep}/>
          <div style={s.sectionTitle}>🏆 MVP投票</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            <button style={s.btn(phase===PHASES.MVP_VOTING?C.green:C.pink)}
              onClick={()=>update({...state,phase:PHASES.MVP_VOTING})}
              disabled={phase===PHASES.MVP_VOTING||saving}>
              MVP投票 開始
            </button>
            <button style={s.btn(C.red)}
              onClick={()=>update({...state,phase:PHASES.MVP_RESULT})} disabled={phase!==PHASES.MVP_VOTING||saving}>
              MVP投票 締め切り
            </button>
          </div>
          <div style={{fontSize:13,color:C.textSub,marginBottom:4}}>
            投票済み: {Object.keys(state.mvpVotes).length} / {PLAYERS.length}名
          </div>

          <div style={s.sep}/>
          {isResult && (
            <button style={{...s.btn(C.blue),marginBottom:8}} onClick={()=>setView("result")}>📊 結果を見る</button>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button style={s.btn("#e67e22")} disabled={saving} onClick={resetMap}>🗺️ MAPリセット</button>
            <button style={s.btn(C.red)} disabled={saving} onClick={resetAll}>🔄 全リセット</button>
            <button style={s.btnGhost} onClick={()=>setView("home")}>ホームへ</button>
          </div>
        </div>
      </div>
    );
  }

  if (view==="result") {
    const mt = mapTally(), rt = runoffTally(), mvt = mvpTally();
    const showMap = [PHASES.MAP_RESULT,PHASES.MAP_RUNOFF,PHASES.MAP_RUNOFF_RESULT,PHASES.MVP_VOTING,PHASES.MVP_RESULT,PHASES.WAITING_MVP].includes(phase);
    const showRunoff = [PHASES.MAP_RUNOFF_RESULT,PHASES.MVP_VOTING,PHASES.MVP_RESULT,PHASES.WAITING_MVP].includes(phase)&&(state.runoffMaps||[]).length>0;
    const showMvp = phase===PHASES.MVP_RESULT;
    return (
      <div style={s.wrap}>
        <div style={s.card}>
          <div style={s.title}>📊 投票結果</div>
          {showMap && (<>
            <div style={s.sectionTitle}>🗺️ MAP投票</div>
            {mt.map(([m,c])=>(
              <div key={m} style={s.row}>
                <span style={s.label}>{m}{c===maxMap&&c>0&&<span style={s.badge}>1位</span>}</span>
                <div style={{flex:1}}><div style={s.bar(maxMap?c/maxMap:0,c===maxMap&&c>0)}/></div>
                <span style={s.count}>{c}</span>
              </div>
            ))}
            <div style={s.sep}/>
          </>)}
          {showRunoff && (<>
            <div style={{...s.sectionTitle,color:C.red}}>🔥 決選投票</div>
            {rt.map(([m,c])=>(
              <div key={m} style={s.row}>
                <span style={s.label}>{m}{c===maxRunoff&&c>0&&<span style={{...s.badge,background:C.red}}>決定</span>}</span>
                <div style={{flex:1}}><div style={s.bar(maxRunoff?c/maxRunoff:0,c===maxRunoff&&c>0)}/></div>
                <span style={s.count}>{c}</span>
              </div>
            ))}
            <div style={s.sep}/>
          </>)}
          {showMvp && (<>
            <div style={s.sectionTitle}>🏆 MVP</div>
            {(() => {
              const ranked = mvt.filter(([,c])=>c>0);
              if (!ranked.length) return <div style={{color:C.textSub}}>まだ投票がありません</div>;
              const first = ranked[0][1];
              const second = ranked.find(([,c])=>c<first)?.[1]||0;
              const firstList = ranked.filter(([,c])=>c===first);
              const display = firstList.length>=2 ? firstList : ranked.filter(([,c])=>c===first||c===second);
              return display.map(([p,c])=>(
                <div key={p} style={{...s.row, background:"linear-gradient(135deg,#fff0f8,#f8f0ff)", borderRadius:12, padding:"12px 14px", border:`1px solid ${C.pink}33`}}>
                  <span style={{flex:1, fontSize:15, fontWeight:700, color:C.pink}}>{p}</span>
                  <span style={s.badge}>MVP</span>
                  <span style={{...s.count,marginLeft:8}}>{c}票</span>
                </div>
              ));
            })()}
          </>)}
          {!showMap&&!showRunoff&&!showMvp&&<div style={{color:C.textSub,textAlign:"center"}}>まだ結果はありません</div>}
          <div style={s.sep}/>
          <button style={s.btnGhost} onClick={()=>setView(adminAuthed?"admin":"home")}>戻る</button>
        </div>
      </div>
    );
  }

  if (view==="player_select") {
    const isRunoff = phase===PHASES.MAP_RUNOFF;
    return (
      <div style={s.wrap}>
        <div style={s.card}>
          <div style={s.title}>{isRunoff?"🔥 決選投票":"👤 参加者を選択"}</div>
          <div style={s.sub}>あなたの名前を選んでください</div>
          <div style={s.grid}>
            {PLAYERS.map(p=>{
              const voted = phase===PHASES.MAP_VOTING ? state.mapVotes[p]
                : phase===PHASES.MAP_RUNOFF ? (state.runoffVotes||{})[p]
                : state.mvpVotes[p];
              return (
                <button key={p} style={{...s.optBtn(selectedPlayer===p),opacity:voted?0.45:1}}
                  disabled={!!voted} onClick={()=>setSelectedPlayer(p)}>
                  {p}{voted&&" ✓"}
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={s.btn()} disabled={!selectedPlayer}
              onClick={()=>setView(phase===PHASES.MVP_VOTING?"mvp_vote":"map_vote")}>次へ</button>
            <button style={s.btnGhost} onClick={()=>{setView("home");setSelectedPlayer(null);}}>戻る</button>
          </div>
        </div>
      </div>
    );
  }

  if (view==="map_vote") {
    const isRunoff = phase===PHASES.MAP_RUNOFF;
    const availableMaps = isRunoff ? (state.runoffMaps||[]) : MAPS;
    return (
      <div style={s.wrap}>
        <div style={s.card}>
          <div style={s.title}>{isRunoff?"🔥 決選MAP投票":"🗺️ MAP投票"}</div>
          <div style={s.sub}>{selectedPlayer} さん — マップを1つ選んでください</div>
          {isRunoff&&<div style={{color:C.red,textAlign:"center",fontSize:13,marginBottom:12}}>同数のMAPで再投票！</div>}
          <div style={s.grid}>
            {availableMaps.map(m=>(
              <button key={m} style={s.optBtn(mapSelection===m)} onClick={()=>setMapSelection(m)}>{m}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={s.btn(isRunoff?C.red:C.pink)} disabled={!mapSelection||saving} onClick={submitMapVote}>
              {saving?"送信中...":"投票する"}
            </button>
            <button style={s.btnGhost} onClick={()=>{setView("player_select");setMapSelection(null);}}>戻る</button>
          </div>
        </div>
      </div>
    );
  }

  if (view==="mvp_vote") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={s.title}>🏆 MVP投票</div>
        <div style={s.sub}>{selectedPlayer} さん — 2名を選んでください（自分以外）</div>
        <div style={{marginBottom:10,textAlign:"center"}}>
          <span style={{color:mvpSelection.length===2?C.green:C.pink,fontWeight:700}}>
            {mvpSelection.length} / 2 票
          </span>
        </div>
        <div style={s.grid}>
          {PLAYERS.filter(p=>p!==selectedPlayer).map(p=>(
            <button key={p} style={s.optBtn(mvpSelection.includes(p))} onClick={()=>toggleMvp(p)}>
              {p}{mvpSelection.includes(p)&&" ✓"}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={s.btn()} disabled={mvpSelection.length!==2||saving} onClick={submitMvpVote}>
            {saving?"送信中...":"投票する"}
          </button>
          <button style={s.btnGhost} onClick={()=>{setView("player_select");setMvpSelection([]);}}>戻る</button>
        </div>
      </div>
    </div>
  );

  if (view==="voted") return (
    <div style={s.wrap}>
      <div style={s.card}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:12}}>🌸</div>
          <div style={s.title}>投票完了！</div>
          <div style={s.sub}>{selectedPlayer} さんの投票を受け付けました</div>
          <button style={s.btn()} onClick={()=>{setView("home");setSelectedPlayer(null);setMvpSelection([]);setMapSelection(null);}}>
            ホームへ戻る
          </button>
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
